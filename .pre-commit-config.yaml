# Pre-commit hooks configuration for code quality automation
# Install: pip install pre-commit
# Setup: pre-commit install
# Run all: pre-commit run --all-files

repos:
  # Python code formatting with Black (100-char line length)
  - repo: https://github.com/psf/black
    rev: 23.12.0
    hooks:
      - id: black
        language_version: python3.12
        args: ['--line-length=100']
        exclude: ^(backend/alembic/|backend/migrations/|node_modules/|\.next/)

  # Python import sorting with isort (Black-compatible)
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile=black', '--line-length=100']
        exclude: ^(backend/alembic/|backend/migrations/|node_modules/|\.next/)

  # Python linting with Ruff (fast AST-based linter)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: ['--fix', '--exit-zero']
        exclude: ^(backend/alembic/|backend/migrations/|node_modules/|\.next/)

  # JavaScript/TypeScript formatting with Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types: ['javascript', 'json', 'yaml', 'markdown']
        exclude: ^(backend/|\.next/|node_modules/)

  # Note: JavaScript/TypeScript linting with ESLint requires npm setup
  # Configure after installing Node dependencies: npm install

  # General checks: YAML validation, JSON validation, trailing whitespace
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        args: ['--unsafe']
      - id: check-json
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: mixed-line-ending
        args: ['--fix=lf']

# CI/CD settings
ci:
  autofix_commit_msg: 'chore: auto-fix code style issues'
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: 'chore: update pre-commit hooks'
  autoupdate_schedule: weekly
  skip: ['mypy', 'eslint']  # Skip in CI to avoid type checking overhead
  submodules: false
