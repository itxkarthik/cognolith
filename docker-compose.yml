services:
  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_STREAM_API_URL: http://localhost:3000/api/v1
    container_name: cognolith-frontend
    environment:
      # Relative path for browser-side requests (proxied by Next.js)
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_STREAM_API_URL: http://localhost:3000/api/v1
      NEXT_PUBLIC_FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL:-http://localhost:8080}
      # Backend URL for Next.js server-side rewrites (internal Docker network)
      BACKEND_URL: http://backend:3000
    ports:
      - "${FRONTEND_PORT:-8080}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cognolith-network

  # PostgreSQL Database
  db:
    image: pgvector/pgvector:pg16
    container_name: cognolith-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_assistant}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cognolith-network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        INSTALL_DEV: "true"
    container_name: cognolith-backend
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DEBUG: ${DEBUG:-False}
      ENVIRONMENT: ${ENVIRONMENT:-local}

      # Database
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_assistant}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-knowledge_assistant}

      # CORS
      FRONTEND_HOST: ${FRONTEND_HOST:-http://localhost:8080}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-["http://localhost:8080","http://127.0.0.1:8080","http://localhost:3000","http://127.0.0.1:3000"]}

      # Security
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      SIGNUP_RATE_LIMIT: ${SIGNUP_RATE_LIMIT:-5/hour}

      # Email verification
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-False}
      SMTP_SSL: ${SMTP_SSL:-False}
      EMAILS_FROM_EMAIL: ${EMAILS_FROM_EMAIL:-no-reply@example.com}
      EMAILS_FROM_NAME: ${EMAILS_FROM_NAME:-Cognolith}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # AI
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:1b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./backend:/usr/src/app/backend
      - ./pyproject.toml:/usr/src/app/pyproject.toml:ro
      - ./requirements-dev.txt:/usr/src/app/requirements-dev.txt:ro
      - ./backend/uploads:/usr/src/app/backend/uploads
      - ./backend/logs:/usr/src/app/backend/logs
    networks:
      - cognolith-network
    command: python run.py

  mailpit:
    image: axllent/mailpit:latest
    container_name: cognolith-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - cognolith-network

  # Optional local AI runtime. Start with: docker compose --profile ai up --build -d
  ollama:
    image: ollama/ollama:latest
    container_name: cognolith-ollama
    profiles: ["ai"]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - cognolith-network

  ollama-models:
    image: ollama/ollama:latest
    container_name: cognolith-ollama-models
    profiles: ["ai"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:1b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull "$${OLLAMA_CHAT_MODEL}"
        ollama pull "$${OLLAMA_EMBEDDING_MODEL}"
    restart: "no"
    networks:
      - cognolith-network

volumes:
  postgres_data:
  ollama_data:

networks:
  cognolith-network:
    driver: bridge
