services:
  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    container_name: pka-frontend
    environment:
      # Relative path for browser-side requests (proxied by Next.js)
      NEXT_PUBLIC_API_URL: /api/v1
      # Backend URL for Next.js server-side rewrites (internal Docker network)
      BACKEND_URL: http://backend:3000
    ports:
      - "8080:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pka-network

  # PostgreSQL Database
  db:
    image: pgvector/pgvector:pg16
    container_name: pka-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_assistant}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pka-network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pka-backend
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DEBUG: ${DEBUG:-False}
      ENVIRONMENT: ${ENVIRONMENT:-local}

      # Database
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_assistant}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-knowledge_assistant}

      # CORS
      FRONTEND_HOST: ${FRONTEND_HOST:-http://localhost:8080}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-["http://localhost:8080","http://127.0.0.1:8080","http://localhost:3000","http://127.0.0.1:3000"]}

      # Security
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # AI
      # For local Ollama: Mac/Windows use host.docker.internal, Linux use host network
      # Or set OLLAMA_BASE_URL=http://ollama:11434 if running ollama in Docker
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./backend:/usr/src/app/backend
      - ./backend/uploads:/usr/src/app/backend/uploads
      - ./backend/logs:/usr/src/app/backend/logs
    networks:
      - pka-network
    command: python run.py

volumes:
  postgres_data:

networks:
  pka-network:
    driver: bridge
